<style>
  :root {
    --bg: #0f1115;
    --bg-elev: #161a22;
    --bg-elev-2: #1d222d;
    --border: #262c3a;
    --text: #e6e8ec;
    --text-dim: #9aa3b2;
    --text-faint: #5d6678;
    --accent: #ff7849;
    --accent-soft: #ff7849;
    --launch: #6ee7b7;
    --post: #f59e0b;
    --rest: #60a5fa;
    --ajax: #c084fc;
    --data: #fbbf24;
    --frontend: #f472b6;
    --admin-c: #94a3b8;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  body { display: grid; grid-template-rows: auto 1fr; grid-template-columns: 1fr; height: 100vh; }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 20px; background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  header h1 span.brand { color: var(--accent); }
  header .meta { color: var(--text-dim); font-size: 12px; }
  header .controls { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  #search {
    background: var(--bg-elev-2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px; border-radius: 6px;
    font-size: 13px; width: 220px;
  }
  #search:focus { outline: none; border-color: var(--accent); }
  .toggle {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-dim); font-size: 12px; cursor: pointer; user-select: none;
  }
  .toggle input { accent-color: var(--accent); }
  main { display: grid; grid-template-columns: 1fr 400px; overflow: hidden; }
  #cy { background: var(--bg); min-height: 0; }
  aside {
    background: var(--bg-elev); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 20px 22px;
  }
  aside .empty { color: var(--text-faint); font-size: 13px; padding-top: 80px; text-align: center; }
  aside h2 { margin: 0 0 4px; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  aside .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  aside .badge.launch { background: rgba(110,231,183,0.15); color: var(--launch); }
  aside .badge.post { background: rgba(245,158,11,0.15); color: var(--post); }
  aside .purpose { color: var(--text-dim); margin: 10px 0 18px; font-size: 13px; }
  aside section { margin-bottom: 18px; }
  aside section h3 {
    margin: 0 0 8px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint);
  }
  aside ul { list-style: none; padding: 0; margin: 0; }
  aside li { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  aside li:last-child { border-bottom: none; }
  aside .class-name { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text); word-break: break-all; }
  aside .file-path { display: block; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--text-faint); margin-top: 2px; word-break: break-all; }
  aside .resp { color: var(--text-dim); font-size: 12px; margin-top: 4px; }
  aside .method-pill {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600; margin-right: 6px;
    background: var(--bg-elev-2); color: var(--rest);
  }
  aside .auth-pill {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 10px; color: var(--text-faint); background: var(--bg-elev-2);
  }
  aside .dep-chip {
    display: inline-block; padding: 3px 9px; border-radius: 99px;
    font-size: 11px; background: var(--bg-elev-2); color: var(--text-dim);
    margin: 0 4px 4px 0; cursor: pointer; border: 1px solid var(--border);
  }
  aside .dep-chip:hover { color: var(--accent); border-color: var(--accent); }
  .legend {
    position: absolute; bottom: 16px; left: 16px;
    background: rgba(22,26,34,0.92); border: 1px solid var(--border);
    padding: 10px 14px; border-radius: 8px; font-size: 11px; color: var(--text-dim);
    backdrop-filter: blur(8px);
  }
  .legend .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend .dot.launch { background: var(--launch); }
  .legend .dot.post { background: var(--post); }
  .legend .dot.integration { background: var(--accent); }
  .loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--text-dim); }
  details { margin-top: 8px; }
  details summary { cursor: pointer; color: var(--text-dim); font-size: 12px; padding: 4px 0; }
  details summary:hover { color: var(--text); }
  details[open] summary { color: var(--text); }
</style>
</head>

  const edges = [];
  const rootId = 'root';
  nodes.push({ data: { id: rootId, label: 'Stride', type: 'root' } });

  const order = data.domain_order || Object.keys(data.domains);
  order.forEach(domainId => {
    const d = data.domains[domainId];
    if (!d) return;
    nodes.push({ data: { id: domainId, label: d.name, type: 'domain', status: d.status, domain: d } });
    edges.push({ data: { id: `${rootId}->${domainId}`, source: rootId, target: domainId, type: 'tree' } });

    // Children: one node per service (most informative). Skip data/endpoints in the graph — they're in the sidebar.
    (d.services || []).forEach((svc, i) => {
      const sid = `${domainId}::svc::${i}`;
      const short = svc.class.split('\\').pop();
      nodes.push({ data: { id: sid, label: short, type: 'service', parentDomain: domainId, service: svc } });
      edges.push({ data: { id: `${domainId}->${sid}`, source: domainId, target: sid, type: 'tree' } });
    });
  });

  // Cross-domain dependency edges (domain → domain only, dashed)
  order.forEach(domainId => {
    const d = data.domains[domainId];
    if (!d) return;
    (d.depends_on || []).forEach(targetId => {
      if (!data.domains[targetId]) return;
      edges.push({ data: { id: `dep::${domainId}->${targetId}`, source: domainId, target: targetId, type: 'dep' } });

  });

      { selector: 'node:selected', style: { 'border-color': '#ff7849', 'border-width': 2.5 } },
      {
        selector: 'edge',
        style: {
          'width': 1,
          'line-color': '#262c3a',
          'target-arrow-color': '#262c3a',
          'target-arrow-shape': 'none',
          'curve-style': 'bezier',

      },
      {
        selector: 'edge[type="dep"]',
        style: {
          'width': 1,
          'line-color': '#ff7849',
          'line-style': 'dashed',
          'target-arrow-color': '#ff7849',
          'target-arrow-shape': 'triangle',
          'arrow-scale': 0.7,

          'curve-style': 'unbundled-bezier',

      },
      { selector: '.dimmed', style: { 'opacity': 0.12 } },
      { selector: '.highlighted', style: { 'border-color': '#ff7849', 'border-width': 2 } },
    ],
    layout: {
      name: 'dagre',
      rankDir: 'TB',
      rankSep: 70,
      nodeSep: 18,
      edgeSep: 12,
      // exclude dep edges from layout so they don't distort the hierarchy
      animate: false,
    },
    wheelSensitivity: 0.2,
    minZoom: 0.2,
    maxZoom: 2.5,
  });

  loader.remove();

  // Initial: hide post-launch
  const applyPostFilter = () => {
    const show = postToggle.checked;
    cy.nodes('node[type="domain"][status="post-launch"]').forEach(n => {
      n.style('display', show ? 'element' : 'none');
      // hide descendants
      cy.nodes(`node[parentDomain="${n.id()}"]`).style('display', show ? 'element' : 'none');
      cy.edges().forEach(e => {
        if (e.source().id() === n.id() || e.target().id() === n.id()) {
          e.style('display', show ? 'element' : 'none');
        }
      });
    });
    cy.layout({ name: 'dagre', rankDir: 'TB', rankSep: 70, nodeSep: 18, animate: false }).run();
  };
  applyPostFilter();
  postToggle.addEventListener('change', applyPostFilter);

  // Sidebar rendering
  const escape = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  function renderDomain(domainId) {
    const d = data.domains[domainId];
    if (!d) return;

    const restList = (d.endpoints.rest || []).map(r =>
      `<li><span class="method-pill">${escape(r.methods)}</span><span class="class-name">${escape(r.namespace)}${escape(r.route)}</span></li>`
    ).join('');
    const ajaxList = (d.endpoints.ajax || []).map(a =>
      `<li><span class="class-name">${escape(a.action)}</span> <span class="auth-pill">${escape(a.auth)}</span></li>`
    ).join('');
    const adminList = (d.endpoints.admin || []).map(p =>
      `<li>${escape(p.title)} <span class="file-path">slug: ${escape(p.slug)}${p.parent ? ' · parent: ' + escape(p.parent) : ''}</span></li>`
    ).join('');
    const frontList = (d.endpoints.frontend || []).map(f =>
      `<li><span class="class-name">[${escape(f.tag)}]</span><span class="file-path">${escape(f.registered_in || '')}</span></li>`
    ).join('');

    const cptList = (d.data.cpts || []).map(c =>
      `<li><span class="class-name">${escape(c.slug)}</span><span class="file-path">${escape(c.registered_in)}${c.purpose ? ' · ' + escape(c.purpose) : ''}</span></li>`
    ).join('');
    const tableList = (d.data.tables || []).map(t =>
      `<li><span class="class-name">${escape(t.name)}</span><span class="file-path">${escape(t.owner)}${t.purpose ? ' · ' + escape(t.purpose) : ''}</span></li>`
    ).join('');
    const taxList = (d.data.taxonomies || []).map(t =>
      `<li><span class="class-name">${escape(t.slug)}</span><span class="file-path">on ${(t.post_types || []).map(escape).join(', ')}</span></li>`
    ).join('');
    const metaList = (d.data.user_meta || []).map(m =>
      `<li><span class="class-name">${escape(m.key)}</span><span class="file-path">${escape(m.source)}${m.purpose ? ' · ' + escape(m.purpose) : ''}${m.format ? ' · ' + escape(m.format) : ''}</span></li>`
    ).join('');

    const svcList = (d.services || []).map(s =>
      `<li>
        <span class="class-name">${escape(s.class)}</span>
        <span class="file-path">${escape(s.file)}${s.priority !== null && s.priority !== undefined ? ' · priority ' + s.priority : ''}</span>
        ${s.responsibilities && s.responsibilities.length ? `<div class="resp">${s.responsibilities.map(escape).join(' · ')}</div>` : ''}
      </li>`
    ).join('');

    const deps = (d.depends_on || []).map(id =>
      `<span class="dep-chip" data-domain="${escape(id)}">${escape(data.domains[id] ? data.domains[id].name : id)}</span>`
    ).join('');

    sidebar.innerHTML = `
      <h2>${escape(d.name)} <span class="badge ${d.status === 'launch' ? 'launch' : 'post'}">${escape(d.status)}</span></h2>
      <p class="purpose">${escape(d.purpose)}</p>

      ${svcList ? `<section><h3>Services (${(d.services || []).length})</h3><ul>${svcList}</ul></section>` : ''}

      ${(cptList || tableList || taxList || metaList) ? `
        <section><h3>Data</h3>
        ${cptList ? `<details open><summary>CPTs (${(d.data.cpts || []).length})</summary><ul>${cptList}</ul></details>` : ''}
        ${tableList ? `<details open><summary>Tables (${(d.data.tables || []).length})</summary><ul>${tableList}</ul></details>` : ''}
        ${taxList ? `<details><summary>Taxonomies (${(d.data.taxonomies || []).length})</summary><ul>${taxList}</ul></details>` : ''}
        ${metaList ? `<details><summary>User meta (${(d.data.user_meta || []).length})</summary><ul>${metaList}</ul></details>` : ''}
        </section>
      ` : ''}

      ${restList ? `<section><h3>REST endpoints (${(d.endpoints.rest || []).length})</h3><ul>${restList}</ul></section>` : ''}
      ${ajaxList ? `<section><h3>AJAX actions (${(d.endpoints.ajax || []).length})</h3><ul>${ajaxList}</ul></section>` : ''}
      ${adminList ? `<section><h3>Admin pages (${(d.endpoints.admin || []).length})</h3><ul>${adminList}</ul></section>` : ''}
      ${frontList ? `<section><h3>Shortcodes (${(d.endpoints.frontend || []).length})</h3><ul>${frontList}</ul></section>` : ''}

      ${deps ? `<section><h3>Depends on</h3><div>${deps}</div></section>` : ''}
    `;

    // Wire dep chips → navigate
    sidebar.querySelectorAll('.dep-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const id = chip.dataset.domain;
        const node = cy.getElementById(id);
        if (node.nonempty()) {
          cy.elements().unselect();
          node.select();
          cy.animate({ center: { eles: node }, zoom: 1 }, { duration: 300 });
          renderDomain(id);
        }
      });
    });
  }

  function renderService(svc, domainId) {
    const d = data.domains[domainId];
    sidebar.innerHTML = `
      <h2>${escape(svc.class.split('\\').pop())}</h2>
      <p class="purpose">Service in <strong style="color:var(--accent);cursor:pointer;" id="back-to-domain">${escape(d.name)}</strong></p>
      <section><h3>Class</h3><ul><li>
        <span class="class-name">${escape(svc.class)}</span>
        <span class="file-path">${escape(svc.file)}${svc.priority !== null && svc.priority !== undefined ? ' · priority ' + svc.priority : ''}</span>
      </li></ul></section>
      ${svc.responsibilities && svc.responsibilities.length ? `<section><h3>Responsibilities</h3><ul>${svc.responsibilities.map(r => `<li>${escape(r)}</li>`).join('')}</ul></section>` : ''}
    `;
    document.getElementById('back-to-domain').addEventListener('click', () => {
      const node = cy.getElementById(domainId);
      cy.elements().unselect();
      node.select();
      renderDomain(domainId);
    });
  }

  cy.on('tap', 'node', evt => {
    const n = evt.target;
    const t = n.data('type');
    if (t === 'domain') renderDomain(n.id());
    else if (t === 'service') renderService(n.data('service'), n.data('parentDomain'));
    else sidebar.innerHTML = `<div class="empty">Click a domain or service node.</div>`;
  });

  cy.on('tap', evt => {
    if (evt.target === cy) {
      sidebar.innerHTML = `<div class="empty">Click a domain or service node.</div>`;
      cy.elements().removeClass('dimmed').removeClass('highlighted');
    }
  });

  // Search
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass('dimmed').removeClass('highlighted');
      return;
    }
    const matched = cy.nodes().filter(n => {
      const label = (n.data('label') || '').toLowerCase();
      if (label.includes(q)) return true;
      const svc = n.data('service');
      if (svc && svc.class.toLowerCase().includes(q)) return true;
      const dom = n.data('domain');
      if (dom) {
        const hay = JSON.stringify(dom).toLowerCase();
        return hay.includes(q);
      }
      return false;
    });
    cy.elements().addClass('dimmed').removeClass('highlighted');
    matched.removeClass('dimmed').addClass('highlighted');
    matched.connectedEdges().removeClass('dimmed');
    matched.predecessors().removeClass('dimmed');
  });

  // Initial fit
  cy.fit(undefined, 40);
})();
</script>
</body>
</html>
