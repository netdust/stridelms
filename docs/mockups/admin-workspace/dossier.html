<!DOCTYPE html>
<html lang="nl-BE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dossier · Stride Admin Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/workspace.css">
  <link rel="stylesheet" href="assets/css/grid.css">
</head>
<body>
<div class="ws-shell" x-data="dossier()" x-cloak>

  <!-- ===== COMMAND RAIL ===== -->
  <aside class="ws-rail">
    <div class="ws-brand">
      <div class="ws-brand__mark" x-html="WS.icon('layers')"></div>
      <div><div class="ws-brand__name">Stride</div><div class="ws-brand__sub">Workspace</div></div>
    </div>
    <nav class="ws-nav">
      <div class="ws-nav__group">
        <div class="ws-nav__label">Werkbank</div>
        <a class="ws-nav__item" href="vandaag.html"><span x-html="WS.icon('sun')"></span> Vandaag <span class="ws-nav__count is-alert">24</span></a>
        <a class="ws-nav__item" href="inschrijvingen.html"><span x-html="WS.icon('grid')"></span> Inschrijvingen <span class="ws-nav__count">247</span></a>
      </div>
      <div class="ws-nav__group">
        <div class="ws-nav__label">Beheer</div>
        <a class="ws-nav__item" href="#"><span x-html="WS.icon('layers')"></span> Edities <span class="ws-nav__count">7</span></a>
        <a class="ws-nav__item" href="#"><span x-html="WS.icon('calendar')"></span> Sessies</a>
        <a class="ws-nav__item" href="#"><span x-html="WS.icon('receipt')"></span> Offertes <span class="ws-nav__count">12</span></a>
        <a class="ws-nav__item" href="#"><span x-html="WS.icon('route')"></span> Trajecten</a>
        <a class="ws-nav__item is-active" href="#"><span x-html="WS.icon('users')"></span> Gebruikers</a>
      </div>
    </nav>
    <div class="ws-rail__foot">
      <div class="ws-user"><div class="ws-user__avatar">SC</div><div><div class="ws-user__name">Sofie Coördinator</div><div class="ws-user__role">stride_coordinator</div></div></div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="ws-main">
    <header class="ws-topbar">
      <div class="ws-topbar__crumbs">
        <a href="inschrijvingen.html" style="color:var(--ws-text-2)">Inschrijvingen</a>
        <span class="sep" x-html="WS.icon('chevRight')" style="width:14px;height:14px"></span>
        <span>Gebruikers</span>
        <span class="sep" x-html="WS.icon('chevRight')" style="width:14px;height:14px"></span>
        <b x-text="person.name"></b>
      </div>
      <div class="ws-topbar__spacer"></div>
      <a class="ws-btn ws-btn--ghost ws-btn--sm" href="inschrijvingen.html"><span x-html="WS.icon('chevRight')" style="transform:rotate(180deg)"></span> Terug naar grid</a>
    </header>

    <div class="ws-content">

      <!-- ===== PERSON HEADER ===== -->
      <div class="ws-person-head ws-stagger">
        <div class="ws-person-head__avatar" :style="`background:linear-gradient(135deg, ${WS.avatarColor(person.name)}, #1d4ed8)`" x-text="WS.initials(person.name)"></div>
        <div class="ws-person-head__info">
          <div class="ws-person-head__name" x-text="person.name"></div>
          <div class="ws-person-head__meta">
            <span x-html="WS.icon('briefcase')+person.role"></span>
            <span x-html="WS.icon('building')+person.org+' · '+person.department"></span>
            <span x-html="WS.icon('mail')+person.email"></span>
            <span x-html="WS.icon('phone')+person.phone"></span>
            <span x-html="WS.icon('mapPin')+person.city"></span>
          </div>
        </div>
        <div class="ws-person-head__actions">
          <button class="ws-btn ws-btn--ghost"><span x-html="WS.icon('mail')"></span> Bericht</button>
          <button class="ws-btn ws-btn--ghost"><span x-html="WS.icon('swap')"></span> Persoon wisselen</button>
        </div>
      </div>

      <div class="ws-dossier">
        <!-- ===== LEFT: registrations ===== -->
        <div>
          <div class="ws-section-title ws-mt-0">
            <span x-html="WS.icon('grid')"></span> Inschrijvingen
            <span class="ws-grouphead__count" x-text="regs.length"></span>
            <span class="ws-section-title__line"></span>
          </div>

          <template x-for="(r, idx) in regs" :key="r.id">
            <div class="ws-reg" :class="r.open && 'is-open'" :id="'reg-'+r.id">
              <!-- reg head -->
              <div class="ws-reg__head" @click="r.open = !r.open">
                <span class="ws-reg__chev" x-html="WS.icon('chevRight')"></span>
                <div class="ws-reg__title">
                  <b x-text="r.edition"></b>
                  <small x-text="r.cohort + ' · ingeschreven ' + r.registered"></small>
                </div>
                <div class="ws-reg__badges">
                  <span class="ws-offerte" :class="'ws-offerte--'+WS.OFFERTE_STATUS[r.offerte].cls" style="margin-right:8px">
                    <span class="ws-offerte__dot"></span><span x-text="WS.OFFERTE_STATUS[r.offerte].label"></span>
                  </span>
                  <span class="ws-badge" :class="'ws-badge--'+WS.REG_STATUS[r.status].cls" x-text="WS.REG_STATUS[r.status].label"></span>
                </div>
              </div>

              <!-- reg body -->
              <div class="ws-reg__body" x-show="r.open" x-collapse>

                <!-- detail grid -->
                <div class="ws-detail-grid">
                  <div class="ws-field ws-field--wide">
                    <div class="ws-field__label">Inschrijvingsstatus</div>
                    <div class="ws-field__val ws-field__val--status">
                      <span class="ws-badge" :class="'ws-badge--'+WS.REG_STATUS[r.status].cls" x-text="WS.REG_STATUS[r.status].label"></span>
                      <!-- pending clarity: what are we waiting for? (Fix 4) -->
                      <span class="ws-status-hint" x-show="r.status === 'pending'">
                        <span x-html="WS.icon('info')"></span>
                        <span>Wacht op gebruiker (intake, sessiekeuze, documenten) <b>of</b> op goedkeuring zodra die taken klaar zijn.</span>
                      </span>
                    </div>
                  </div>
                  <div class="ws-field"><div class="ws-field__label">Inschrijvingspad</div><div class="ws-field__val" x-text="r.path"></div></div>
                  <div class="ws-field"><div class="ws-field__label">Ingeschreven op</div><div class="ws-field__val" x-text="r.registered"></div></div>
                  <div class="ws-field"><div class="ws-field__label">Startdatum</div><div class="ws-field__val" x-text="r.startDate"></div></div>
                </div>

                <!-- linked quote -->
                <div class="ws-section-title"><span x-html="WS.icon('receipt')"></span> Gekoppelde offerte <span class="ws-section-title__line"></span></div>
                <div class="ws-quote-card">
                  <div class="ws-quote-card__icon" x-html="WS.icon('receipt')"></div>
                  <div style="flex:1">
                    <div class="ws-quote-card__amount" x-text="r.quote.amount"></div>
                    <div class="ws-quote-card__ref" x-text="r.quote.ref"></div>
                  </div>
                  <span class="ws-offerte" :class="'ws-offerte--'+WS.OFFERTE_STATUS[r.quote.status].cls">
                    <span class="ws-offerte__dot"></span><span x-text="WS.OFFERTE_STATUS[r.quote.status].label"></span>
                  </span>
                </div>

                <!-- enrollment_data STAGES (3-key shape). Only stages WITH submitted
                     data render (empty stages are hidden entirely, Fix 5). Each is a
                     CLOSED collapsible panel; it opens only when clicked. The intake
                     stage IS the questionnaire — there is no separate Vragenlijst. -->
                <div class="ws-section-title"><span x-html="WS.icon('fileText')"></span> Ingediende gegevens <span class="ws-section-title__line"></span></div>
                <template x-if="submittedStages(r).length">
                  <div class="ws-stages">
                    <template x-for="s in submittedStages(r)" :key="s.key">
                      <div class="ws-stage" :class="openStages[r.id+'-'+s.key] && 'is-open'">
                        <div class="ws-stage__head" @click="toggleStage(r.id, s.key)" role="button" :aria-expanded="!!openStages[r.id+'-'+s.key]">
                          <div class="ws-stage__icon" x-html="WS.icon(s.meta.icon)"></div>
                          <div class="ws-stage__heading">
                            <span class="ws-stage__name" x-text="s.meta.name"></span>
                            <span class="ws-stage__desc" x-text="s.meta.desc"></span>
                          </div>
                          <span class="ws-stage__submitted">
                            <b x-text="s.stage.submitted_at"></b>
                            <span class="ws-stage__by" x-show="s.stage.submitted_by">door <span x-text="s.stage.submitted_by"></span></span>
                          </span>
                          <span class="ws-stage__chev" x-html="WS.icon('chevDown')"></span>
                        </div>
                        <!-- stage data — clean label→value pairs, never raw JSON.
                             Each pair is ONE real element so x-for renders it
                             (a nested <template> wrapper would stay inert). -->
                        <div class="ws-stage__body" x-show="openStages[r.id+'-'+s.key]" x-collapse>
                          <dl class="ws-kv">
                            <template x-for="(val, label) in s.stage.data" :key="label">
                              <div class="ws-kv__row">
                                <dt x-text="humanizeKey(label)"></dt>
                                <dd x-text="val"></dd>
                              </div>
                            </template>
                          </dl>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
                <template x-if="!submittedStages(r).length">
                  <p class="ws-muted" style="font-size:var(--ws-fs-sm);font-style:italic;margin:0">Nog geen gegevens ingediend.</p>
                </template>

                <!-- attendance per session -->
                <div class="ws-section-title"><span x-html="WS.icon('calendar')"></span> Aanwezigheid per sessie <span class="ws-section-title__line"></span></div>
                <div class="ws-att-list">
                  <template x-for="s in r.attendance" :key="s.title">
                    <div class="ws-att-row">
                      <span class="ws-att-row__dot" :class="'ws-att-row__dot--'+s.state"></span>
                      <div class="ws-att-row__title"><span x-text="s.title"></span><small x-text="s.date"></small></div>
                      <span class="ws-att-row__state" :class="'ws-att-row__state--'+s.state" x-text="attLabel(s.state)"></span>
                    </div>
                  </template>
                </div>

                <!-- selections + completion tasks -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--ws-6)">
                  <div>
                    <div class="ws-section-title"><span x-html="WS.icon('route')"></span> Gekozen sessies <span class="ws-section-title__line"></span></div>
                    <div class="ws-pill-list">
                      <template x-for="sel in r.selections" :key="sel"><span class="ws-pill" x-html="WS.icon('check')+sel"></span></template>
                    </div>
                  </div>
                  <div>
                    <div class="ws-section-title"><span x-html="WS.icon('checkCircle')"></span> Voltooiingstaken <span class="ws-section-title__line"></span></div>
                    <div class="ws-pill-list">
                      <template x-for="t in r.completion" :key="t.label">
                        <span class="ws-pill" :class="t.done ? 'ws-pill--done' : 'ws-pill--todo'">
                          <span x-html="WS.icon(t.done ? 'check' : 'clock')"></span><span x-text="t.label"></span>
                        </span>
                      </template>
                    </div>
                  </div>
                </div>

                <!-- notes -->
                <div class="ws-section-title"><span x-html="WS.icon('edit')"></span> Notities <span class="ws-section-title__line"></span></div>
                <template x-if="r.notes.length">
                  <div style="display:flex;flex-direction:column;gap:8px">
                    <template x-for="n in r.notes" :key="n.text">
                      <div class="ws-note"><span x-text="n.text"></span><div class="ws-note__meta" x-text="n.meta"></div></div>
                    </template>
                  </div>
                </template>
                <template x-if="!r.notes.length">
                  <p class="ws-muted" style="font-size:var(--ws-fs-sm);font-style:italic;margin:0">Geen notities.</p>
                </template>

                <!-- STATE-APPROPRIATE ACTIONS (derived from §2.1 map) — real buttons -->
                <div class="ws-reg-actions">
                  <div class="ws-reg-actions__label"><span x-html="WS.icon('sparkle')"></span> Acties voor deze inschrijving</div>
                  <div class="ws-reg-actions__row">
                    <template x-for="(a, i) in actionsFor(r.status)" :key="a.id">
                      <button class="ws-action-btn"
                              :class="a.danger ? 'ws-action-btn--danger' : (i===0 ? 'ws-action-btn--primary' : 'ws-action-btn--secondary')"
                              :title="a.label">
                        <span class="ws-action-btn__ico" x-html="WS.icon(a.icon)"></span>
                        <span x-text="a.label"></span>
                      </button>
                    </template>
                    <template x-if="actionsFor(r.status).length === 0">
                      <span class="ws-reg-actions__none">
                        <span x-html="WS.icon('info')"></span>
                        Geen acties — geannuleerd. Een nieuwe inschrijving start een nieuw dossier.
                      </span>
                    </template>
                  </div>
                </div>

              </div>
            </div>
          </template>
        </div>

        <!-- ===== RIGHT: history timeline ===== -->
        <div>
          <div class="ws-card ws-timeline-card">
            <div class="ws-card__head">
              <span x-html="WS.icon('history')" style="width:17px;height:17px;color:var(--ws-primary)"></span>
              <span class="ws-card__title">Geschiedenis</span>
            </div>
            <div class="ws-card__body">
              <div style="font-size:var(--ws-fs-sm);color:var(--ws-text-3);margin-bottom:var(--ws-4);display:flex;align-items:center;gap:6px">
                <span x-html="WS.icon('info')" style="width:14px;height:14px"></span>
                Per-gebeurtenis events — leven hier, nooit in de grid.
              </div>
              <div class="ws-timeline">
                <template x-for="(ev, i) in activeTimeline" :key="i">
                  <div class="ws-tl-item">
                    <span class="ws-tl-item__node" :class="'ws-tl-item__node--'+ev.dot" x-html="WS.icon(ev.icon || 'clock')"></span>
                    <div class="ws-tl-item__title" x-text="ev.title"></div>
                    <div class="ws-tl-item__meta">
                      <span class="ws-tl-item__actor" x-html="WS.icon(actorIsAdmin(ev.actor) ? 'briefcase' : 'user')"></span>
                      <span class="ws-tl-item__actor" x-text="ev.actor"></span> · <span x-text="ev.when"></span>
                    </div>
                  </div>
                </template>
              </div>
              <div style="margin-top:var(--ws-4);padding-top:var(--ws-4);border-top:1px solid var(--ws-border)">
                <select class="ws-select" style="width:100%" x-model.number="timelineReg">
                  <template x-for="r in regs" :key="r.id">
                    <option :value="r.id" x-text="'Tijdlijn: ' + r.edition"></option>
                  </template>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.14.1/dist/cdn.min.js" defer></script>
<script src="assets/js/data.js"></script>
<script>
function dossier() {
  // canonical stage order (matches the enrollment lifecycle, not object order)
  const STAGE_ORDER = ['interest', 'waitlist', 'enrollment_personal', 'enrollment_billing', 'initial_selection', 'intake', 'evaluation'];

  return {
    person: WS.DOSSIER.person,
    regs: WS.DOSSIER.registrations,
    openStages: {},               // "<regId>-<stageKey>" -> true ; ALL CLOSED by default (Fix 5)
    timelineReg: WS.DOSSIER.registrations[0].id,

    init() {
      // Stages render CLOSED by default — they open only on click (Fix 5).
      // If arriving via #reg-<id>, just expand that REGISTRATION (not its stages).
      const hash = location.hash.match(/reg-(\d+)/);
      if (hash) {
        const id = Number(hash[1]);
        const r = this.regs.find(x => x.id === id);
        if (r) { this.regs.forEach(x => x.open = (x.id === id)); this.timelineReg = id; }
      }
    },

    /* only stages WITH submitted data, in canonical order. A stage is "empty"
       (and hidden) when it's null/absent or its .data has no keys (3-key shape). */
    submittedStages(r) {
      return STAGE_ORDER
        .filter(key => {
          const s = r.stages[key];
          return s && s.data && Object.keys(s.data).length > 0;
        })
        .map(key => ({ key, stage: r.stages[key], meta: WS.STAGE_META[key] || { name: key, icon: 'fileText', desc: '' } }));
    },

    toggleStage(regId, key) {
      const k = regId + '-' + key;
      this.openStages[k] = !this.openStages[k];
    },

    /* turn a stored field key into a readable Dutch-ish label (snake_case → words) */
    humanizeKey(key) {
      if (!/[_a-z]/.test(key) || /\s/.test(key)) return key; // already human
      const s = key.replace(/_/g, ' ').replace(/\s+/g, ' ').trim();
      return s.charAt(0).toUpperCase() + s.slice(1);
    },

    /* crude actor-type heuristic for the timeline icon (admin vs the user) */
    actorIsAdmin(actor) {
      return /co[öo]rdinator|beheer|systeem|admin/i.test(actor || '');
    },

    actionsFor(state) { return WS.actionsForState(state); },
    attLabel(s) { return { present:'Aanwezig', absent:'Afwezig', excused:'Verontschuldigd', upcoming:'Nog te volgen' }[s]; },
    get activeTimeline() { return (this.regs.find(r => r.id === this.timelineReg) || this.regs[0]).timeline; },
  };
}
</script>
</body>
</html>
