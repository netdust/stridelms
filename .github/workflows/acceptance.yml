name: Acceptance

# FULL Codeception acceptance suite (all 27 Cests), run against a throwaway CI
# WordPress + a Selenium service container. The standup creates the manual
# /mijn-account/ dashboard page and runs the feature-matrix seeder
# (scripts/seed.php) so the seed-dependent Cests (dashboards, trajectories,
# online enrollment, course-sidebar) have their fixtures. install-wp.sh
# activates every plugin the Cests need (LearnDash, ntdst-assistant/audit/auth,
# fluent-crm/smtp). The shared tests/acceptance.suite.yml is NOT edited — CI
# overrides live in tests/_envs/ci.yml, merged via `--env ci`; DDEV-local runs
# untouched. Cests run one-per-`codecept run` (Codeception 5 takes one test
# arg) via an explicit allow-list so a future-broken Cest can be dropped
# without touching the shared suite.
on:
  # Push is limited to long-lived branches (+ ci-seam-* for throwaway proof
  # pushes); a PR-branch push would otherwise double-run this — the most
  # expensive suite (it boots Selenium). Do NOT widen the push branch list
  # without removing the pull_request trigger, or every PR runs acceptance twice.
  push:
    branches: [main, staging, 'ci-seam-*']
  pull_request:
  workflow_dispatch:

# Least-privilege: reads the repo + uploads a failure artifact only.
permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest

    env:
      # The standup mirrors integration.yml's disposable-DB affirmation.
      STRIDE_TEST_DB_DISPOSABLE: '1'
      # Throwaway literal — NOT a real secret (mirrors integration.yml's
      # ci-not-secret). Valid ONLY against this per-run throwaway WordPress,
      # which is destroyed with the runner. The login backdoor it arms is hard-
      # gated to non-production WP_ENV (web/app/mu-plugins/test-login-helper.php).
      STRIDE_TEST_LOGIN_SECRET: 'ci-acceptance-not-secret'
      # Web-side test-env signal so test-login-helper.php arms without DDEV.
      CODECEPTION_TEST: 'true'

    services:
      database:
        image: mariadb:10.11
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=20s
          --health-retries=10
      selenium:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444
        # CRITICAL: chrome crashes intermittently without enlarged /dev/shm.
        options: >-
          --shm-size=2g
          --health-cmd="curl -f http://localhost:4444/wd/hub/status"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      # Mailpit captures the synchronous confirmation mails PreEnrollmentFlowCest
      # + TrajectoryE2ECest assert (they poll its HTTP API at :8025). The app
      # sends via fluent-smtp → SMTP :1025 (configured below). Both ports bind on
      # the runner host; app + tests reach them at 127.0.0.1.
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 8025:8025
          - 1025:1025

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mysqli, gd, zip, intl
        coverage: none
        tools: wp-cli

    - name: Cache Composer dependencies
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install Composer dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    # Resolve the bridge-gateway IP the SELENIUM container uses to reach the
    # runner host. This single value is used for BOTH WP_HOME (asset origin)
    # and WP_URL (browser-navigated origin) so the host strings match (CORS-
    # module rule) AND the selenium container can reach php -S. No hardcoded
    # subnet — read the default route from inside the running container.
    - name: Resolve runner-host gateway as seen by Selenium
      id: gw
      run: |
        SVC=$(docker ps --filter "ancestor=selenium/standalone-chrome:latest" --format '{{.ID}}' | head -1)
        if [ -z "$SVC" ]; then echo "selenium container not found"; docker ps; exit 1; fi
        # Resolve the bridge gateway from the RUNNER via `docker inspect`, NOT
        # from inside the selenium image — that image has no `ip`/iproute2
        # (`sh: ip: not found`). The container's network .Gateway IS the address
        # it uses to reach the runner host. The runner has docker access; the
        # image needs no tooling.
        HOST_GW=$(docker inspect "$SVC" --format '{{range .NetworkSettings.Networks}}{{.Gateway}}{{end}}' | head -1)
        if [ -z "$HOST_GW" ]; then echo "could not resolve gateway"; docker inspect "$SVC" --format '{{json .NetworkSettings.Networks}}'; exit 1; fi
        echo "host_gw=$HOST_GW" >> "$GITHUB_OUTPUT"
        # Persist the resolved container ID so the later reachability check
        # provably targets the SAME selenium container (CR I-2) instead of
        # re-deriving it with another `docker ps` that could pick a different one.
        echo "svc=$SVC" >> "$GITHUB_OUTPUT"
        echo "Selenium reaches runner host at: $HOST_GW"

    # WP_HOME/WP_URL host = the gateway IP (same string both sides). DB_PREFIX
    # stride_ matches the overlay + the shared suite default. The login secret
    # is written via heredoc (never on a command line / never echoed).
    - name: Write .env
      run: |
        HOST_GW='${{ steps.gw.outputs.host_gw }}'
        cat > .env <<ENV
        DB_NAME=wordpress
        DB_USER=wordpress
        DB_PASSWORD=password
        DB_HOST=127.0.0.1
        DB_PREFIX=stride_
        WP_ENV=development
        WP_HOME=http://${HOST_GW}:8080
        WP_SITEURL=http://${HOST_GW}:8080/wp
        STRIDE_TEST_LOGIN_SECRET=${STRIDE_TEST_LOGIN_SECRET}
        AUTH_KEY=ci-not-secret
        SECURE_AUTH_KEY=ci-not-secret
        LOGGED_IN_KEY=ci-not-secret
        NONCE_KEY=ci-not-secret
        AUTH_SALT=ci-not-secret
        SECURE_AUTH_SALT=ci-not-secret
        LOGGED_IN_SALT=ci-not-secret
        NONCE_SALT=ci-not-secret
        ENV

    # install-wp.sh hardcodes `wp core install --url=http://localhost:8080`.
    # The acceptance run needs the install URL to match WP_HOME (gateway IP) so
    # siteurl/home options emit gateway-host asset URLs. Override the option
    # AFTER the script runs (the script set localhost; correct it here) rather
    # than forking the shared script.
    - name: Install WordPress + Stride stack
      run: bash scripts/ci/install-wp.sh

    - name: Point siteurl/home at the gateway host
      run: |
        HOST_GW='${{ steps.gw.outputs.host_gw }}'
        wp option update home "http://${HOST_GW}:8080"
        # NB (CR I-3): the siteurl OPTION write below is inert — Bedrock's
        # WP_SITEURL constant (set in .env above) overrides the DB option at
        # runtime, so the constant is what actually takes effect. Kept for
        # symmetry with `home`. Do NOT "simplify" by deleting the .env
        # WP_SITEURL line believing this option write covers it — it does not.
        wp option update siteurl "http://${HOST_GW}:8080/wp"
        wp rewrite flush --hard

    # The manual content pages live DBs carry but code never provisions (see
    # docs/LAUNCH-CHECKLIST.md "Recreate footer pages"). A fresh CI install must
    # create them so the Cests that navigate to them resolve:
    #   - mijn-account → page-mijn-account.php template (dashboard/profile/trajectory Cests)
    #   - interesse    → [stride_interest] shortcode  (PreEnrollmentFlowCest)
    #   - wachtlijst   → [stride_waitlist] shortcode  (PreEnrollmentFlowCest)
    # Idempotent: skip any that already exist.
    - name: Create the manual content pages
      run: |
        create_page() { # slug title (template|content)
          local slug="$1" title="$2" kind="$3" val="$4"
          if wp post list --post_type=page --name="$slug" --field=ID | grep -q .; then return; fi
          if [ "$kind" = "template" ]; then
            wp post create --post_type=page --post_status=publish \
              --post_name="$slug" --post_title="$title" --page_template="$val"
          else
            wp post create --post_type=page --post_status=publish \
              --post_name="$slug" --post_title="$title" --post_content="$val"
          fi
        }
        create_page mijn-account "Mijn account" template page-mijn-account.php
        create_page interesse    "Interesse"    content  "[stride_interest]"
        create_page wachtlijst   "Wachtlijst"   content  "[stride_waitlist]"
        wp rewrite flush --hard

    # Route wp_mail through fluent-smtp → Mailpit SMTP (127.0.0.1:1025). The app's
    # confirmation mails are sent SYNCHRONOUSLY in the request thread (no cron),
    # so they land in Mailpit before the Cests' 5s poll. The mailer's From is the
    # site admin_email (ci@example.com, set by install-wp.sh) — map that exact
    # address to the Mailpit connection AND force_from so any From routes there.
    - name: Point fluent-smtp at Mailpit
      run: |
        wp option update fluentmail-settings --format=json '{
          "connections": {
            "mailpit": {
              "title": "Mailpit",
              "provider_settings": {
                "sender_name": "Stride CI",
                "sender_email": "ci@example.com",
                "force_from_name": "no",
                "force_from_email": "yes",
                "provider": "smtp",
                "host": "127.0.0.1",
                "port": "1025",
                "auth": "no",
                "username": "",
                "password": "",
                "encryption": "none",
                "auto_tls": "no",
                "key_store": "db"
              }
            }
          },
          "mappings": { "ci@example.com": "mailpit" },
          "misc": { "default_connection": "mailpit", "log_emails": "yes", "simulate_emails": "no" }
        }'

    # Seed the feature-matrix fixtures the seed-dependent Cests need
    # (seed_student1 + its registrations, published editions, trajectories,
    # catalog content). Gated to WP_ENV in [development,local]; the .env above
    # sets WP_ENV=development so the gate passes. Pure DB writes, idempotent,
    # no network — runs once, before the Cest loop.
    - name: Seed feature-matrix fixtures
      run: wp eval-file scripts/seed.php

    # TEMP DIAGNOSTIC (remove once OnlineEnrollmentCest is green): dump what
    # LearnDash actually reads back for the Beweegbeleid course's price type, so
    # we can see whether the seeder's learndash_update_setting write took effect
    # in CI (it does in DDEV; CI still renders "Start").
    - name: DEBUG course price type
      run: |
        wp eval '
          $id = get_page_by_path("e-learning-beweegbeleid-ontwikkelen", OBJECT, "sfwd-courses")->ID ?? 0;
          if (!$id) { $p = get_posts(["post_type"=>"sfwd-courses","s"=>"Beweegbeleid Ontwikkelen","numberposts"=>1]); $id = $p[0]->ID ?? 0; }
          echo "course_id=$id\n";
          echo "learndash_get_setting(price_type)=" . var_export(learndash_get_setting($id,"course_price_type"), true) . "\n";
          echo "learndash_get_course_price=" . json_encode(function_exists("learndash_get_course_price") ? learndash_get_course_price($id) : "n/a") . "\n";
          $ld = get_post_meta($id, "_sfwd-courses", true);
          echo "_sfwd-courses=" . json_encode($ld) . "\n";
          echo "_ld_price_type=" . var_export(get_post_meta($id, "_ld_price_type", true), true) . "\n";
          echo "getAccessMode=" . \Stride\Integrations\LearnDash\LearnDashHelper::getAccessMode($id) . "\n";
          $sid = get_user_by("login","seed_student1")->ID ?? 0;
          echo "seed_student1_id=$sid\n";
          echo "has_access=" . var_export(function_exists("sfwd_lms_has_access") ? sfwd_lms_has_access($id,$sid) : "n/a", true) . "\n";
          echo "course_access_from_meta=" . var_export(get_user_meta($sid, "course_".$id."_access_from", true), true) . "\n";
          $cal = get_post_meta($id, "course_access_list", true);
          echo "course_access_list=" . var_export($cal, true) . "\n";
          echo "getCourseAction_label=" . (\Stride\Integrations\LearnDash\LearnDashHelper::getCourseAction($id,$sid)["label"] ?? "?") . "\n";
          // What course is at the slug the test navigates to?
          $bySlug = get_page_by_path("e-learning-beweegbeleid-ontwikkelen", OBJECT, "sfwd-courses");
          $slugId = $bySlug->ID ?? 0;
          echo "SLUG_course_id=$slugId title=" . ($bySlug->post_title ?? "?") . "\n";
          echo "SLUG_getAccessMode=" . ($slugId ? \Stride\Integrations\LearnDash\LearnDashHelper::getAccessMode($slugId) : "?") . "\n";
          echo "SLUG_has_access(student)=" . var_export($slugId ? sfwd_lms_has_access($slugId,$sid) : "?", true) . "\n";
          echo "SLUG_getCourseAction_label=" . ($slugId ? (\Stride\Integrations\LearnDash\LearnDashHelper::getCourseAction($slugId,$sid)["label"] ?? "?") : "?") . "\n";
          // How many Beweegbeleid courses exist?
          $all = get_posts(["post_type"=>"sfwd-courses","s"=>"Beweegbeleid","numberposts"=>-1]);
          foreach ($all as $c) { echo "  beweeg_course: id={$c->ID} name={$c->post_name} title={$c->post_title}\n"; }
        '

    # Synthesize tests/.env the suite + Acceptance helper read (%WP_URL%,
    # admin creds, admin path, and the SAME login secret so the codecept CLI
    # process resolves it via Acceptance::testLoginSecret()).
    - name: Write tests/.env for Codeception
      run: |
        HOST_GW='${{ steps.gw.outputs.host_gw }}'
        cat > tests/.env <<ENV
        WP_URL=http://${HOST_GW}:8080
        WP_ADMIN_USERNAME=ciadmin
        WP_ADMIN_PASSWORD=ciadmin
        WP_ADMIN_PATH=/wp/wp-admin
        STRIDE_TEST_LOGIN_SECRET=${STRIDE_TEST_LOGIN_SECRET}
        ENV

    # Bind 0.0.0.0 (NOT 127.0.0.1) so the selenium container can reach php -S
    # via the gateway. Health-probe via the gateway host, matching what the
    # browser will use.
    - name: Serve WordPress over HTTP (php -S on 0.0.0.0)
      run: |
        PHP_CLI_SERVER_WORKERS=4 php -S 0.0.0.0:8080 -t web scripts/ci/router.php >/tmp/php-server.log 2>&1 &
        for i in $(seq 1 30); do
          if curl -fso /dev/null "http://localhost:8080/index.php?rest_route=/"; then
            echo "server up after ${i}s"; exit 0
          fi
          sleep 1
        done
        echo "PHP built-in server failed to come up"; cat /tmp/php-server.log; exit 1

    # HIGHEST-RISK PREMISE CHECK: prove the selenium container can actually
    # reach php -S at the gateway BEFORE running Cests, so a networking failure
    # is one clear line, not 5 Cest timeouts.
    - name: Verify Selenium can reach php -S
      run: |
        HOST_GW='${{ steps.gw.outputs.host_gw }}'
        # Reuse the exact container the gateway was resolved from (CR I-2).
        SVC='${{ steps.gw.outputs.svc }}'
        # Tool-agnostic reachability probe: the selenium image is minimal (no
        # iproute2; curl/wget presence is not guaranteed). Try curl, then wget,
        # then a bash /dev/tcp connect — whichever the image has.
        URL="http://${HOST_GW}:8080/index.php?rest_route=/"
        if docker exec "$SVC" sh -c "command -v curl >/dev/null && curl -fsS -o /dev/null '$URL'" \
           || docker exec "$SVC" sh -c "command -v wget >/dev/null && wget -q -O /dev/null '$URL'" \
           || docker exec "$SVC" bash -c "exec 3<>/dev/tcp/${HOST_GW}/8080" ; then
          echo "Selenium reaches php -S at ${HOST_GW}:8080 — networking OK"
        else
          echo "Selenium CANNOT reach php -S at ${HOST_GW}:8080 — networking premise failed"
          cat /tmp/php-server.log; exit 1
        fi

    # FULL SUITE — explicit allow-list (one `run` per Cest). Codeception 5's
    # `run` takes at most ONE test argument, and an explicit list keeps per-Cest
    # fail-fast + lets us drop a future-broken Cest without editing the shared
    # acceptance.suite.yml. All 27 should pass given the seeder + /mijn-account
    # page above (install-wp.sh activates every plugin the Cests need). Graceful
    # self-skippers (CatalogShakeout one method, EnrollmentDataShape, Trajectory)
    # report skips, not failures.
    - name: Run acceptance suite (all Cests)
      run: |
        set -e
        for cest in OnlineEnrollmentCest; do  # TEMP diagnostic scope
          echo "── Running acceptance: $cest ──"
          vendor/bin/codecept run acceptance --env ci "$cest"
        done

    - name: Upload Codeception output on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: codeception-output
        path: tests/_output/
        retention-days: 7
