name: CI

# Push trigger limited to long-lived branches (PR-branch pushes otherwise
# double-run every suite); ci-seam-* kept for throwaway seam-proof pushes.
on:
  push:
    branches: [main, staging, 'ci-seam-*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Single PHP version: composer.lock pins openspout/openspout v4.32 (~8.3),
    # and the platform runs 8.3 (.ddev). The old 8.1/8.2 matrix legs failed
    # composer install on every run since ~2026-05-18.

    steps:
    - uses: actions/checkout@v4

    # Architecture invariants — fails the build only on a blocking violation
    # (INV-1: a REST route with no permission_callback). Advisory items are
    # printed but do not fail. Pure bash/grep — runs once, before Composer.
    # See ARCHITECTURE-INVARIANTS.md.
    - name: Check architecture invariants
      run: bash scripts/check-invariants.sh

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: Cache Composer dependencies
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Check Composer lock file is up to date
      run: composer validate --no-check-all

    - name: Install Composer dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    # Pint is scoped (composer.json) to the shipping trees: stride-core,
    # ntdst-core, stridence. bck/, tests/manual, marketing etc. are excluded
    # via pint.json — they are not shipping code.
    - name: Run Pint
      run: composer lint

  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mysqli
        coverage: none

    - name: Cache Composer dependencies
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install Composer dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Run unit tests
      run: composer test:unit

    # PHPStan level 1 + baseline (audit 0.3 / finding M-7). All pre-existing
    # findings live in phpstan-baseline.neon; NEW violations fail this step.
    - name: Run PHPStan
      run: composer lint:stan
