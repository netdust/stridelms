# site.yml — operational config for this project
# Read by netdust-wp-manager scripts and Claude when managing this site.

site:
  name: stridelms
  domain: app.stridelms.be
  risk: low                  # high | medium | low
  description: "LMS platform — 4000+ users"

structure:
  type: bedrock            # bedrock | custom-app | custom-app-public | custom-site
  webroot: web                # relative path to webroot
  wpcli_path: web/wp          # --path= value for WP-CLI (or "auto" if wp-cli.yml handles it)

hosting:
  provider: ploi           # combell | ploi
  ssh_staging: ploi-staging
  ssh_production:
  remote_path_staging: /home/ploi/app.stridelms.be/web
  remote_path_production:

deploy:
  method: makefile            # makefile | git-push
  staging_command: make deploy-staging
  production_command: make deploy-production
  staging_branch: staging     # only for git-push method
  production_branch: main     # only for git-push method

local:
  ddev_project: stride
  start: ddev start
  url: https://stride.ddev.site

notes:
  - "Completion proofs live in web/app/uploads/stride-proofs/ — MUST be deny-ruled in nginx on every environment (Ploi): add `location ^~ /app/uploads/stride-proofs/ { deny all; }` to the site's nginx config, BEFORE the static-file locations. The bundled .htaccess only covers Apache and is inert under nginx; downloads go exclusively through the authenticated stride_download_proof handler. Locally this rule lives in the taken-over .ddev/nginx_full/nginx-site.conf and is asserted over real HTTP by CompletionProofProtectionTest (CR-D1)."
  - "Post-deploy verification (copy-paste, expect 403 then 200 — second curl proves the deny rule didn't over-match static files): curl -s -o /dev/null -w '%{http_code}\\n' https://app.stridelms.be/app/uploads/stride-proofs/any-name.pdf && curl -s -o /dev/null -w '%{http_code}\\n' https://app.stridelms.be/app/themes/stridence/style.css"
  - "Known residual (accepted, CR-D1): the REST media API (/wp-json/wp/v2/media) still exposes proof attachments' source_url paths — acceptable because that URL now yields 403 at the web server; deferral recorded."
  - "ntdst-audit schema v2 (audit H-4 / M8): first request after deploy runs ALTER TABLE wp_audit_log adding STORED generated column subject_user_id + indexes (idx_subject_user, idx_action), version-gated by option ntdst_audit_schema_version. DDL only — no UPDATEs touch row data — but MariaDB rebuilds the table on disk for a STORED column (table write-locked during rebuild; measured ~1s at 64k rows locally on MariaDB 10.11 — expect seconds, not minutes, at launch scale). Deploy off-peak. Rollback: ALTER TABLE wp_audit_log DROP INDEX idx_subject_user, DROP INDEX idx_action, DROP COLUMN subject_user_id; then set option ntdst_audit_schema_version back to 1 (and pin code to ntdst-audit 1.0.0 — 1.1.0 queries reference the column). DB-flavor note (CR-F3): staging server is MySQL 8, NOT MariaDB — probed 2026-06-10 via ssh ploi-staging (mysql client 8.0.46, Ubuntu 24.04; WP not yet deployed there, so server version unconfirmed — verify with wp db query 'SELECT VERSION();' at deploy). The migration uses portable information_schema existence checks (MariaDB-only 'ADD ... IF NOT EXISTS' DDL would parse-error on MySQL 8). DB floor: MariaDB 10.2.3+ / MySQL 8.0.21+ (JSON_VALUE in a generated column)."
  - "Redis cache exclusions must be verified before any wp cache flush"
  - "Never push directly to main without staging validation"
  - "LMS data (LearnDash, Tin Canny) excluded from object cache"
  - "Redis object cache (audit H-3 / task F2): PREP ONLY. The redis-cache plugin (Till Krüss) is installed via composer (wpackagist-plugin/redis-cache) and MUST stay INACTIVE — do not activate, do not copy object-cache.php. Enablement is BLOCKED on: (1) Q5 — confirm Redis is available on the Ploi production plan, and (2) parked task 1.2 — Makefile/deploy ops access (Stefan personally)."
  - "Redis ENABLEMENT procedure (when unblocked): 1) add env config to the environment's .env — WP_REDIS_HOST (127.0.0.1 on Ploi local Redis), WP_REDIS_PORT (6379), WP_REDIS_PASSWORD (if set), WP_REDIS_DATABASE, and a per-environment WP_REDIS_PREFIX (e.g. stride_staging_/stride_prod_ — mandatory if staging and production share one Redis instance); 2) wp plugin activate redis-cache; 3) wp redis enable — this copies the object-cache.php drop-in into web/app/; 4) verify with wp redis status (expect Status: Connected) and load a page checking debug.log for connection errors; 5) configure cache-group exclusions BEFORE go-live — LMS data (LearnDash, Tin Canny) stays excluded per the note above (WP_REDIS_IGNORED_GROUPS). Rollback: wp redis disable (removes the drop-in), then deactivate the plugin."
  - "Redis FLUSH procedure — FLEET RULE, cite before any flush: never blind-flush Redis on LMS sites. Flushing wipes LearnDash transients/session state (in-progress quiz/lesson state, Tin Canny reporting caches) for 4000+ users. Use targeted invalidation instead: wp cache flush-group <group> for the specific group, or let TTLs expire naturally. A full flush (redis-cli FLUSHALL or wp cache flush against Redis) is allowed ONLY with explicit sign-off from Stefan AND during a maintenance window. Also re-read the exclusions note above before any flush."
